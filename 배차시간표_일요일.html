<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb">
<title>버스 배차 관리</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html { background-color: #e2e8f0; height: 100%; display: flex; justify-content: center; }
body { font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif; background:#f5f5f5; font-size:12px; -webkit-text-size-adjust:none; display:flex; flex-direction:column; height: 100%; width: 100%; max-width: 1000px; box-shadow: 0 0 20px rgba(0,0,0,0.15); overflow: hidden; margin: 0 auto; }

.topbar { background:#fff; border-bottom:1px solid #ddd; padding:8px 12px; display:flex; align-items:center; justify-content:space-between; z-index:20; box-shadow:0 1px 3px rgba(0,0,0,.08); flex-shrink:0; }
.topbar h1 { font-size:14px; font-weight:bold; color: #2563eb; }
.tabs { display:flex; gap:4px }
.tab { padding:7px 10px; border-radius:8px; font-size:12px; font-weight:bold; border:none; cursor:pointer; background:#f0f0f0; color:#555; transition: 0.2s; }
.tab.active { background:#2563eb; color:#fff }
.tab.print-btn { background:#10b981; color:#fff; } 
.tab.share-btn { background:#8b5cf6; color:#fff; }

.quick-nav { display: flex; background: #fff; padding: 6px 12px; gap: 6px; border-bottom: 1px solid #e2e8f0; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; flex-shrink: 0; align-items: center; }
.quick-nav::-webkit-scrollbar { height: 0px; background: transparent; }
.nav-btn { padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; text-decoration: none; color: #4a5568; background: #edf2f7; border: 1px solid #cbd5e0; cursor: pointer; }
.nav-btn.active { background: #2563eb; color: #fff; border-color: #2563eb; }

.infobar { padding:4px 12px; background:#eff6ff; font-size:10px; color:#1d4ed8; display:flex; gap:12px; flex-shrink:0; border-bottom: 1px solid #bfdbfe; }
.infobar b { font-weight:bold }
.content { flex:1; overflow-y:auto; background:#f5f5f5; padding-bottom: 40px; }

table { border-collapse:collapse; width:100%; table-layout:fixed; background:#fff; }
th { background:#dbeafe; border:1px solid #9ca3af; padding:2px; font-size:10px; text-align:center; position:sticky; top:0; z-index:10 }
td { border:1px solid #d1d5db; text-align:center; padding:1px; font-size:11px }
td.seq { font-weight:bold; background:#f8fafc; width:28px }
td.rest-bad { background:#fee2e2; color:#b91c1c }

td.dep, td.arr { font-size: 11px; font-weight: bold; color: #1d4ed8; }
td.dep-s { color:#dc2626; font-weight:bold; }
td.tt, td.hj { font-size: 8.5px; letter-spacing: -1px; color: #64748b; white-space: nowrap; overflow: hidden; text-overflow: clip; padding: 0; line-height: 1.1; }

.input-table input { width:100%; text-align:center; border:none; background:transparent; outline:none; font-size:11px; padding:6px 2px; color:#1d4ed8 }
.modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:50; display:flex; align-items:center; justify-content:center; padding:16px }
.modal { background:#fff; border-radius:16px; padding:24px; width:100%; max-width:340px; text-align:center; }
.modal-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; text-align:left; }
.modal-row input { width:64px; height:40px; border:2px solid #93c5fd; border-radius:8px; text-align:center; font-size:16px; font-weight:bold; }
.hidden { display:none }

/* [일반 화면 전용] 분리 화면 상단 오전/오후 정렬 */
.split-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 8px; padding-bottom: 4px; border-bottom: 2px solid #1e40af; }
.split-header.pm { border-bottom-color: #991b1b; }
.split-header .title { font-size: 16px; font-weight: 900; color: #1e40af; }
.split-header.pm .title { color: #991b1b; }
.split-header .info { font-size: 14px; font-weight: bold; color: #475569; }

/* === [핵심] 인쇄(PDF) 전용 스타일 (사진 렌더링 폼 강제 주입) === */
#print-container { display: none; }
@media print {
    html, body { height: 100% !important; background: #fff !important; margin: 0 !important; padding: 0 !important; }
    @page { size: A4 portrait; margin: 10mm; }
    
    body.custom-printing > :not(#print-container) { display: none !important; }
    body.custom-printing #print-container { display: block !important; width: 100%; background: #fff; }
    
    .custom-print-page {
        width: 100%;
        height: 250mm; /* A4 한 장에 꽉 차게 */
        page-break-after: always;
        break-after: page;
        display: flex;
        flex-direction: column;
        background: #ffffff;
        margin: 0 auto;
    }
}
</style>
</head>
<body>

<div class="topbar">
  <h1 id="appTitle">배차 관리</h1>
  <div class="tabs">
    <button class="tab active" onclick="switchView('integrated')">통합</button>
    <button class="tab" onclick="switchView('split')">분리</button>
    <button class="tab" onclick="switchView('input')">입력</button>
    <button class="tab share-btn" onclick="openShareModal()">📷 전송</button>
    <button class="tab print-btn" onclick="triggerPrint()">🖨️</button>
    <button class="tab" onclick="openSettings()">⚙️</button>
  </div>
</div>

<div class="quick-nav">
  <button onclick="location.replace('index.html')" class="nav-btn" style="background:#4a5568; color:#fff;">🏠 홈</button>
  <button onclick="location.replace('배차시간표_평일.html')" id="link-weekday" class="nav-btn">평일</button>
  <button onclick="location.replace('배차시간표_토요일.html')" id="link-saturday" class="nav-btn">토요일</button>
  <button onclick="location.replace('배차시간표_일요일.html')" id="link-sunday" class="nav-btn">일요일</button>
  <button onclick="location.replace('배차시간표_방학.html')" id="link-vacation" class="nav-btn">방학</button>
</div>

<div class="infobar" id="infobar"></div>
<div class="content" id="content"></div>
<div id="print-container"></div>

<div class="modal-bg hidden" id="modal-bg" onclick="closeSettings()">
  <div class="modal" onclick="event.stopPropagation()">
    <h3 style="text-align:left;">⚙️ 배차 설정</h3><br>
    <div class="modal-row"><label>운행대수</label><div><input id="s-bc" type="number">대</div></div>
    <div class="modal-row"><label>회차지비율</label><input id="s-rt" type="text" style="width:80px"></div>
    <div class="modal-row"><label>오후시작</label><div><input id="s-pt" type="number" style="width:45px">회<input id="s-pb" type="number" style="width:45px">번</div></div>
    <div style="display:flex; gap:10px; margin-top:20px;">
        <button style="flex:1; padding:10px; border-radius:8px; border:none; background:#eee;" onclick="closeSettings()">취소</button>
        <button style="flex:1; padding:10px; border-radius:8px; border:none; background:#2563eb; color:white; font-weight:bold;" onclick="applySettings()">적용</button>
    </div>
  </div>
</div>

<div class="modal-bg hidden" id="share-modal-bg" onclick="closeShareModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <h3 style="margin-bottom:20px">📷 시간표 사진 전송</h3>
    <button style="width:100%; padding:14px; margin-bottom:10px; border-radius:8px; background:#2563eb; color:#fff; border:none; font-weight:bold; font-size:14px;" onclick="captureAndShare('integrated')">통합 시간표 전송</button>
    <button style="width:100%; padding:14px; margin-bottom:10px; border-radius:8px; background:#1e40af; color:#fff; border:none; font-weight:bold; font-size:14px;" onclick="captureAndShare('am')">오전 시간표 전송</button>
    <button style="width:100%; padding:14px; margin-bottom:10px; border-radius:8px; background:#991b1b; color:#fff; border:none; font-weight:bold; font-size:14px;" onclick="captureAndShare('pm')">오후 시간표 전송</button>
    <button style="width:100%; padding:14px; border-radius:8px; background:#e2e8f0; color:#4a5568; border:none; font-weight:bold; margin-top:10px" onclick="closeShareModal()">닫기</button>
  </div>
</div>

<script>
if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(console.error); }

const fileName = window.location.pathname.split('/').pop() || 'default_101';
const STORAGE_KEY = 'bus101Data_v3_' + decodeURIComponent(fileName); // 새로운 초기화를 위해 키 번호 상향
let displayTitle = decodeURIComponent(fileName).replace('.html', '').replace('배차시간표_', '');

const busNum = localStorage.getItem('busNumber') || '101';
document.getElementById('appTitle').innerText = `${busNum}번 ${displayTitle}`;

window.addEventListener('DOMContentLoaded', () => {
    const navLinks = {
        '배차시간표_평일.html': 'link-weekday',
        '배차시간표_토요일.html': 'link-saturday',
        '배차시간표_일요일.html': 'link-sunday',
        '배차시간표_방학.html': 'link-vacation'
    };
    const activeId = navLinks[decodeURIComponent(fileName)];
    if (activeId) document.getElementById(activeId).classList.add('active');
});

let busCount=16, ratio=0.525, pmTrip=3, pmBus=4, currentView='integrated';
const deps={}, tts={};

function loadData() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
        const parsed = JSON.parse(saved);
        busCount = parsed.busCount || 16;
        ratio = parsed.ratio || 0.525;
        pmTrip = parsed.pmTrip || 3;
        pmBus = parsed.pmBus || 4;
        Object.assign(deps, parsed.deps || {});
        Object.assign(tts, parsed.tts || {});
    } else {
        const decodedName = decodeURIComponent(fileName);
        let defaultDeps = {};
        let defaultTts = {};
        if (decodedName.includes('토요일')) {
            busCount = 14; ratio = 0.525; pmTrip = 3; pmBus = 2;
            defaultDeps = {"1-1":"4:45", "1-2":"8:05", "1-3":"11:35", "2-3":"11:50", "2-4":"15:21", "2-5":"18:55", "1-6":"22:15"};
        } else if (decodedName.includes('일요일')) {
            busCount = 12; ratio = 0.525; pmTrip = 3; pmBus = 2;
            defaultDeps = {"1-1":"4:45", "2-1":"4:59", "1-2":"8:07", "1-3":"11:33", "2-3":"11:50", "2-4":"15:23", "2-5":"18:57", "1-6":"22:15"};
        } else if (decodedName.includes('방학')) {
            busCount = 15; ratio = 0.525; pmTrip = 3; pmBus = 4;
            defaultDeps = {"1-1":"4:45", "1-2":"7:56", "3-3":"11:37", "4-3":"11:50", "4-4":"15:20", "4-5":"19:07", "7-5":"S", "3-6":"22:15"};
        } else {
            busCount = 15; ratio = 0.525; pmTrip = 3; pmBus = 4;
            defaultDeps = {
                "1-1":"4:45", "1-2":"7:45", "1-3":"11:09", "1-4":"14:37", "1-5":"18:18", "1-6":"21:45",
                "2-1":"4:57", "2-2":"7:58", "2-3":"11:23", "2-4":"14:51", "2-5":"18:33", "2-6":"22:00",
                "3-1":"5:09", "3-2":"8:12", "3-3":"11:37", "3-4":"15:05", "3-5":"18:48", "3-6":"22:15"
            };
            defaultTts = {
                "1-1":"140", "1-2":"170", "1-3":"175", "1-4":"170", "1-5":"175",
                "2-1":"142", "2-2":"170", "2-3":"175", "2-4":"170", "2-5":"175",
                "3-1":"140", "3-2":"170", "3-3":"175", "3-4":"170", "3-5":"175"
            };
        }
        Object.assign(deps, defaultDeps);
        Object.assign(tts, defaultTts);
    }
}

function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify({ busCount, ratio, pmTrip, pmBus, deps, tts })); }
function pt(s){if(!s||s==='')return null; const m=String(s).match(/^(\d{1,2}):(\d{2})$/); return m?parseInt(m[1])*60+parseInt(m[2]):null;}
function fmt(m,h24){if(m==null)return'—'; if(m==='S')return'S'; const hh=Math.floor(m/60),mm=Math.round(m%60); return `${h24?hh:hh%24}:${mm<10?'0'+mm:mm}`;}

function compute(){
  const N=busCount, tot=N*6, seq=[];
  for(let d=1;d<=tot;d++){
    const trip=Math.floor((d-1)/N)+1, bus=((d-1)%N)+1;
    const raw=deps[`${bus}-${trip}`];
    const isS=typeof raw==='string'&&raw.toUpperCase()==='S';
    const isA=raw!=null&&!isS&&pt(raw)!=null;
    const val=isA?pt(raw):null;
    const tt=tts[`${bus}-${trip}`];
    seq.push({d,trip,bus,isS,isA,val,tt:tt!=null?Number(tt):null,act:!isS});
  }
  let cum=0; for(const s of seq){if(s.act)cum++;s.cum=cum;}
  const anc=seq.filter(s=>s.isA);
  for(const s of seq){
    s.pa=null;s.na=null;
    for(let i=anc.length-1;i>=0;i--)if(anc[i].d<=s.d){s.pa=anc[i];break;}
    for(let i=0;i<anc.length;i++)if(anc[i].d>=s.d){s.na=anc[i];break;}
  }
  for(const s of seq){
    if(s.isS){s.ex='S';continue;}if(s.isA){s.ex=s.val;continue;}
    if(!s.act||!s.pa||!s.na){s.ex=null;continue;}
    if(s.pa.cum===s.na.cum){s.ex=s.pa.val;continue;}
    s.ex=s.pa.val+(s.cum-s.pa.cum)/(s.na.cum-s.pa.cum)*(s.na.val-s.pa.val);
  }
  for(const s of seq){
    if(s.trip<=1||s.d<=N){s.rest=null;continue;}
    const p=seq[s.d-1-N];
    if(!p||p.ex==null||p.ex==='S'||p.tt==null||s.ex==null||s.ex==='S'){s.rest=null;continue;}
    s.rest=s.ex-(p.ex+p.tt);
  }
  for(let i=0;i<seq.length;i++){
    const pr=i>0&&seq[i-1].rest!=null?seq[i-1].rest:null;
    const nr=i<seq.length-1&&seq[i+1].rest!=null?seq[i+1].rest:null;
    seq[i].anr=pr!=null&&nr!=null?(pr+nr)/2:pr??nr??null;
  }
  for(const s of seq){
    if(s.isA||!s.act||!s.pa||!s.na||s.pa.cum===s.na.cum){s.ii=null;}
    else{s.ii=(s.na.val-s.pa.val)/(s.na.cum-s.pa.cum);}
    s.ifr=s.ii!=null?s.ii-Math.floor(s.ii):null;
  }
  let ce=0,pv=null;
  for(const s of seq){
    if(s.isA){s.fd=s.val;ce=0;pv=s.val;continue;}
    if(s.isS){s.fd='S';continue;}
    if(!s.act||s.ii==null||pv==null){s.fd=null;continue;} 
    const tc=ce+s.ifr;
    if(tc>=1){s.fd=pv+Math.floor(s.ii)+1;ce=tc-1;}
    else if(tc>=.49&&tc<=.51){
      if(s.rest!=null&&s.anr!=null){
        if(s.rest<=s.anr){s.fd=pv+Math.floor(s.ii)+1;ce=tc-1;}
        else{s.fd=pv+Math.floor(s.ii);ce=tc;}
      }else{s.fd=pv+Math.round(s.ii);ce=tc>=1?tc-1:tc;}
    }else{s.fd=pv+Math.floor(s.ii);ce=tc;}
    pv=s.fd;
  }
  for(const s of seq){ if(s.fd!=null&&s.fd!=='S'&&s.tt!=null){s.mp=s.fd+s.tt*ratio;s.ar=s.fd+s.tt;} }
  for(const s of seq){
    if(s.trip<=1||s.d<=N){s.dr=null;continue;}
    const p=seq[s.d-1-N];
    if(!p||p.fd==null||p.fd==='S'||p.tt==null||s.fd==null||s.fd==='S'){s.dr=null;continue;}
    s.dr=Math.round(s.fd-(p.fd+p.tt));
  }
  return seq;
}

let schedule;
const gs=(b,t)=>schedule.find(s=>s.bus===b&&s.trip===t);

function render(){
    document.getElementById('infobar').innerHTML=`<span>운행: <b>${busCount}</b>대</span><span>비율 <b>${ratio}</b></span><span>오후 <b>${pmTrip}회${pmBus}번</b>~</span>`;
    const c=document.getElementById('content');
    if(currentView==='integrated') renderIntegrated(c);
    else if(currentView==='split') renderSplit(c);
    else renderInput(c);
}

function busRows(bus,slots){
    let r1=`<td rowspan="3" class="seq">${bus}</td>`, r2='', r3='';
    slots.forEach((s,i)=>{
        const isS=s&&s.fd==='S'; 
        r1+=`<td colspan="2" class="dep ${isS?'dep-s':''}">${s?fmt(s.fd):''}</td>`;
        if(i<slots.length-1){ const ns=slots[i+1]; r1+=`<td rowspan="3" class="rest ${ns&&ns.dr!=null&&ns.dr<30&&!isS?'rest-bad':''}">${ns&&ns.dr!=null?ns.dr:''}</td>`; }
        r2+=`<td class="tt">${s&&s.tt||''}</td><td class="hj">${s&&s.mp!=null?fmt(s.mp):''}</td>`;
        r3+=`<td colspan="2" class="arr">${s&&s.ar!=null?fmt(s.ar,true):''}</td>`;
    });
    return `<tr>${r1}</tr><tr>${r2}</tr><tr>${r3}</tr>`;
}

function thead(trips){
    let h='<tr><th style="width:28px">순번</th>';
    trips.forEach((t,i)=>{ h+=`<th colspan="2">${t}회</th>`; if(i<trips.length-1) h+=`<th style="width:28px">휴식</th>`; });
    return `<thead>${h}</tr></thead>`;
}

function renderIntegrated(el){
    let h=`<div style="padding:8px"><table>${thead([1,2,3,4,5,6])}<tbody>`;
    for(let b=1;b<=busCount;b++) h+=busRows(b,[1,2,3,4,5,6].map(t=>gs(b,t)));
    el.innerHTML=h+'</tbody></table></div>';
}

function renderSplit(el){
    const splitD=(pmTrip-1)*busCount+pmBus;
    let h='<div class="split-grid"><div class="split-item"><div class="section-title section-am">오전</div><table>'+thead([1,2,3])+'<tbody>';
    for(let b=1;b<=busCount;b++) h+=busRows(b,[1,2,3].map(t=>(t-1)*busCount+b<splitD?gs(b,t):null));
    h+='</tbody></table></div><div class="split-item"><div class="section-title section-pm">오후 (${pmTrip}회${pmBus}번~)</div><table>'+thead([1,2,3])+'<tbody>';
    for(let p=0;p<busCount;p++){
        const b=((pmBus-1+p)%busCount)+1;
        h+=busRows(b,[1,2,3].map(dt=>{const at=b>=pmBus?pmTrip+dt-1:pmTrip+dt; return at<=6?gs(b,at):null;}));
    }
    el.innerHTML=h+'</tbody></table></div></div>';
}

function renderInput(el){
    let h='<div style="padding:8px"><table class="input-table"><thead><tr><th style="width:24px">번</th>';
    for(let t=1;t<=6;t++) h+=`<th>${t}출발</th><th style="width:36px">운행</th>`;
    h+='</tr></thead><tbody>';
    for(let b=1;b<=busCount;b++){
        h+=`<tr><td style="font-weight:bold;background:#f8fafc;">${b}</td>`;
        for(let t=1;t<=6;t++){
            const dk=`${b}-${t}`, dv=deps[dk]||'', tv=tts[dk]||'';
            h+=`<td><input class="${dv.toUpperCase()==='S'?'s-val':''}" value="${dv}" data-type="dep" data-bus="${b}" data-trip="${t}" onblur="onInput(this)"></td>`;
            h+=`<td><input value="${tv}" data-type="tt" data-bus="${b}" data-trip="${t}" onblur="onInput(this)"></td>`;
        }
        h+='</tr>';
    }
    el.innerHTML=h+'</tbody></table></div>';
}

function onInput(el){
    const b=el.dataset.bus, t=el.dataset.trip, v=el.value.trim();
    if(el.dataset.type==='dep'){ if(!v) delete deps[`${b}-${t}`]; else deps[`${b}-${t}`]=v; }
    else { if(!v) delete tts[`${b}-${t}`]; else tts[`${b}-${t}`]=v; }
    saveData(); schedule=compute();
}

function switchView(v){
    currentView=v; document.querySelectorAll('.tab').forEach((t,i)=>{ if(i<3) t.classList.toggle('active',['integrated','split','input'][i]===v); });
    schedule=compute(); render();
}

function openSettings(){
    document.getElementById('s-bc').value=busCount; document.getElementById('s-rt').value=ratio;
    document.getElementById('s-pt').value=pmTrip; document.getElementById('s-pb').value=pmBus;
    document.getElementById('modal-bg').classList.remove('hidden');
}
function closeSettings(){document.getElementById('modal-bg').classList.add('hidden');}
function applySettings(){
    busCount=Number(document.getElementById('s-bc').value); ratio=Number(document.getElementById('s-rt').value);
    pmTrip=Number(document.getElementById('s-pt').value); pmBus=Number(document.getElementById('s-pb').value);
    closeSettings(); saveData(); schedule=compute(); render();
}

function openShareModal() { document.getElementById('share-modal-bg').classList.remove('hidden'); }
function closeShareModal() { document.getElementById('share-modal-bg').classList.add('hidden'); }

/* ========================================================================= */
/* [핵심 마법] 사진 전송과 인쇄(PDF)가 100% 동일하게 렌더링 되도록 해주는 공통 모듈 */
/* ========================================================================= */
function getScheduleHTML(target, isPrint = false) {
    const exportTitle = `${busNum}번 배차 시간표 (${displayTitle})`;

    let subHeader = '';
    if (target === 'am') {
        subHeader = `<div style="font-size:24px; font-weight:900; color:#1e3a8a;">오전</div>`;
    } else if (target === 'pm') {
        subHeader = `<div style="font-size:24px; font-weight:900; color:#991b1b;">오후</div>`;
    } else {
        subHeader = `<div></div>`; // 통합일 때는 왼쪽에 아무것도 없음
    }

    let contentHTML = `<h2 style="text-align:center; margin:0 0 15px 0; font-size:36px; color:#1e3a8a; font-weight:900; line-height:1;">${exportTitle}</h2>`;
    let borderStyle = target === 'integrated' ? 'none' : `2px solid ${target==='pm'?'#991b1b':'#1e3a8a'}`;
    
    // 오전/오후 글자와 운행대수를 똑같은 24px 크기로 동일 선상에 배치
    contentHTML += `<div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:10px; border-bottom: ${borderStyle}; padding-bottom:5px;">
                        ${subHeader}
                        <div style="font-size:24px; font-weight:bold; color:#334155; line-height:1;">운행대수: ${busCount}대</div>
                    </div>`;

    let hasAnyTT = false;
    for(let key in tts) {
        if(tts[key] && String(tts[key]).trim() !== '') { hasAnyTT = true; break; }
    }

    const maxTableHeight = 900; // 헤더 영역(오전/오후)이 커졌으므로 표 공간을 조금 줄임
    const totalRows = hasAnyTT ? busCount * 3 : busCount; 
    const exactCellHeight = maxTableHeight / (totalRows + 1); 
    const rowPercentage = (100 / (totalRows + 1)).toFixed(3);
    
    // 운행시간 유무에 따라 폰트를 섬세하게 축소/확대
    const fsSeq = hasAnyTT ? Math.max(9, Math.floor(exactCellHeight * 0.65)) : Math.max(10, Math.floor(exactCellHeight * 0.45)); 
    const fsTime = hasAnyTT ? Math.max(10, Math.floor(exactCellHeight * 0.75)) : Math.max(10, Math.floor(exactCellHeight * 0.55)); 
    const fsSub = Math.max(11, Math.floor(exactCellHeight * 0.60)); 
    const fsDepOnly = Math.max(14, Math.floor(exactCellHeight * 0.60)); 

    const heightStr = isPrint ? `height: ${rowPercentage}%;` : `height: ${exactCellHeight}px;`;
    const wrapperStyle = isPrint 
        ? `width: 100%; height: 100%; display: flex; flex-direction: column;` 
        : `width: 794px; height: 1123px; padding: 40px 30px; box-sizing: border-box; display: flex; flex-direction: column; background: #ffffff; position: relative;`;

    let html = `<style>
        .export-wrapper table { border-collapse:collapse; width:100%; height:100%; table-layout:fixed; background:#fff; box-sizing:border-box; }
        .export-wrapper th { background:#e2e8f0 !important; border:1px solid #94a3b8; text-align:center; font-size:${Math.max(12, Math.floor(exactCellHeight * 0.5))}px; font-weight:800; color:#1e293b; padding:0 !important; ${heightStr} box-sizing:border-box; line-height:1; -webkit-print-color-adjust:exact; color-adjust:exact; }
        .export-wrapper td { border:1px solid #cbd5e0; text-align:center; vertical-align:middle; padding:0 !important; ${heightStr} box-sizing:border-box; line-height:1; -webkit-print-color-adjust:exact; color-adjust:exact; }
        .export-wrapper td.seq { font-weight:900; background:#f8fafc !important; font-size:${fsSeq}px; color:#0f172a; border-right:2px solid #94a3b8; -webkit-print-color-adjust:exact; color-adjust:exact; }
        .export-wrapper td.dep { font-size:${fsTime}px; font-weight:900; color:#1d4ed8; border-bottom:none; -webkit-print-color-adjust:exact; color-adjust:exact; }
        .export-wrapper td.arr { font-size:${fsTime}px; font-weight:900; color:#1d4ed8; border-top:none; -webkit-print-color-adjust:exact; color-adjust:exact; }
        .export-wrapper td.dep-only { font-size:${fsDepOnly}px; font-weight:900; color:#1d4ed8; -webkit-print-color-adjust:exact; color-adjust:exact; }
        .export-wrapper td.dep-s { color:#dc2626; -webkit-print-color-adjust:exact; color-adjust:exact; }
        .export-wrapper td.tt, .export-wrapper td.hj { font-size:${fsSub}px; color:#64748b; font-weight:bold; border-top:1px dashed #e2e8f0; border-bottom:1px dashed #e2e8f0; letter-spacing:-0.5px; white-space:nowrap; overflow:hidden; -webkit-print-color-adjust:exact; color-adjust:exact; }
        .export-wrapper td.tt { border-right:1px dashed #e2e8f0; }
    </style>
    <div class="export-wrapper" style="${wrapperStyle}">
        ${contentHTML}
        <div style="flex:1; width:100%;">
            <table>`;

    function getExportThead(trips) {
        let h = `<tr><th style="width:40px">순번</th>`;
        trips.forEach(t => { h += `<th colspan="2">${t}회</th>`; });
        return `<thead>${h}</tr></thead>`;
    }

    function getExportBusRows(bus, slots) {
        let r1 = `<td rowspan="${hasAnyTT ? 3 : 1}" class="seq">${bus}</td>`, r2 = '', r3 = '';
        slots.forEach(s => {
            const isS = s && s.fd === 'S';
            const dep = s ? fmt(s.fd) : '';
            if (hasAnyTT) {
                r1 += `<td colspan="2" class="dep ${isS?'dep-s':''}">${dep}</td>`;
                r2 += `<td class="tt">${s&&s.tt?s.tt:''}</td><td class="hj">${s&&s.mp!=null?fmt(s.mp):''}</td>`;
                r3 += `<td colspan="2" class="arr">${s&&s.ar!=null?fmt(s.ar,true):''}</td>`;
            } else {
                r1 += `<td colspan="2" class="dep-only ${isS?'dep-s':''}">${dep}</td>`;
            }
        });
        return hasAnyTT ? `<tr>${r1}</tr><tr>${r2}</tr><tr>${r3}</tr>` : `<tr>${r1}</tr>`;
    }

    const splitD = (pmTrip - 1) * busCount + pmBus;

    if (target === 'integrated') {
        html += `${getExportThead([1,2,3,4,5,6])}<tbody>`;
        for(let b=1; b<=busCount; b++) html += getExportBusRows(b, [1,2,3,4,5,6].map(t=>gs(b,t)));
        html += `</tbody>`;
    } else if (target === 'am') {
        html += `${getExportThead([1,2,3])}<tbody>`;
        for(let b=1; b<=busCount; b++) html += getExportBusRows(b, [1,2,3].map(t=>(t-1)*busCount+b<splitD?gs(b,t):null));
        html += `</tbody>`;
    } else if (target === 'pm') {
        html += `${getExportThead([1,2,3])}<tbody>`;
        for(let p=0; p<busCount; p++){
            const b = ((pmBus-1+p)%busCount)+1;
            html += getExportBusRows(b, [1,2,3].map(dt=>{const at=b>=pmBus?pmTrip+dt-1:pmTrip+dt; return at<=6?gs(b,at):null;}));
        }
        html += `</tbody>`;
    }
    
    html += `</table></div></div>`;
    return html;
}

/* [사진 캡처 실행 모듈] */
async function captureAndShare(target) {
    closeShareModal();
    
    const loading = document.createElement('div');
    loading.innerHTML = '<div style="position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:9999; display:flex; align-items:center; justify-content:center; color:white; font-size:18px; font-weight:bold;">고화질 이미지 렌더링 중...</div>';
    document.body.appendChild(loading);

    const exportDiv = document.createElement('div');
    exportDiv.style.position = 'absolute';
    exportDiv.style.left = '-9999px';
    exportDiv.style.top = '0';
    exportDiv.innerHTML = getScheduleHTML(target, false);
    document.body.appendChild(exportDiv);

    let titleSuffix = '';
    if (target === 'am') titleSuffix = ' (오전)';
    if (target === 'pm') titleSuffix = ' (오후)';
    if (target === 'integrated') titleSuffix = ' (통합)';
    const exportTitle = `${busNum}번 ${displayTitle} 시간표${titleSuffix}`;

    try {
        const canvas = await html2canvas(exportDiv.firstChild, { scale: 2, useCORS: true, windowWidth: 800, windowHeight: 1150 });
        canvas.toBlob(async (blob) => {
            const file = new File([blob], `${exportTitle}.png`, { type: 'image/png' });
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                try { await navigator.share({ files: [file], title: exportTitle, text: '배차 시간표를 공유합니다.' }); } 
                catch (err) { downloadBlob(blob, `${exportTitle}.png`); }
            } else { downloadBlob(blob, `${exportTitle}.png`); }
            document.body.removeChild(exportDiv);
            document.body.removeChild(loading);
        }, 'image/png');
    } catch (e) {
        alert("이미지 생성 중 오류가 발생했습니다.");
        document.body.removeChild(exportDiv);
        document.body.removeChild(loading);
    }
}

function downloadBlob(blob, filename) {
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.style.display = 'none';
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    window.URL.revokeObjectURL(url);
    document.body.removeChild(a);
}

/* [인쇄(PDF) 실행 모듈] 화면 렌더링 없이 바로 인쇄창 띄우기 */
function triggerPrint() {
    if (currentView === 'input') {
        document.body.classList.remove('custom-printing');
        window.print();
        return;
    }
    
    document.body.classList.add('custom-printing');
    
    let printContainer = document.getElementById('print-container');
    if (!printContainer) {
        printContainer = document.createElement('div');
        printContainer.id = 'print-container';
        document.body.appendChild(printContainer);
    }
    printContainer.innerHTML = '';
    
    if (currentView === 'integrated') {
        const page = document.createElement('div');
        page.className = 'custom-print-page';
        page.innerHTML = getScheduleHTML('integrated', true);
        printContainer.appendChild(page);
    } else if (currentView === 'split') {
        const page1 = document.createElement('div');
        page1.className = 'custom-print-page';
        page1.innerHTML = getScheduleHTML('am', true);
        printContainer.appendChild(page1);
        
        const page2 = document.createElement('div');
        page2.className = 'custom-print-page';
        page2.innerHTML = getScheduleHTML('pm', true);
        printContainer.appendChild(page2);
    }
    
    setTimeout(() => { window.print(); }, 200);
}

window.onafterprint = function() {
    document.body.classList.remove('custom-printing');
};

loadData(); schedule=compute(); render();
